appId: com.vraj.windowbundler
productName: WindowBundler
mac:
  category: public.app-category.productivity
  target: dmg
  icon: assets/icon.icns
  hardenedRuntime: true
  extraResources:
    - from: native/window-helper
      to: window-helper
dmg:
  title: WindowBundler
  artifactName: WindowBundler-${version}.dmg
files:
  - dist/**/*
  - "!node_modules/**/*"
directories:
  output: release
